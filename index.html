<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MasteryCap" />
  <meta name="description" content="MasteryCap — offline personal institute. Software craft, market literacy, honest certificates." />
  <meta name="color-scheme" content="dark light" />
  <title>MasteryCap</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="preload" href="fonts/geistmono-500.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="css/app.css?v=4820" />
  <link rel="stylesheet" href="css/institute.css?v=4820" />
</head>
<body>
  <!-- film grain texture overlay -->
  <div id="grain" aria-hidden="true"></div>

  <!-- Splash -->
  <div id="splash">
    <div class="splash-inner">
      <div class="splash-bench" aria-hidden="true">
        <div class="bench-leg bench-leg-l"></div>
        <div class="bench-leg bench-leg-r"></div>
        <div class="bench-top"></div>
        <div class="bench-peg"></div>
        <div class="splash-stamp">Ready</div>
      </div>
      <div class="splash-wordmark">Mastery<span>Cap</span></div>
      <div class="splash-rule" aria-hidden="true"></div>
      <div class="splash-tag">Personal learning campus</div>
    </div>
    <div class="splash-foot">Admission · Branches · Craft</div>
  </div>

  <!-- App -->
  <div id="app-root"></div>

  <!-- Bottom nav -->
  <nav class="tabbar hidden" id="tabbar"></nav>

  <script type="module" src="js/app.js?v=4820"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const regs = await navigator.serviceWorker.getRegistrations();
          // Always re-register so CACHE bump in sw.js takes effect
          await navigator.serviceWorker.register('sw.js?v=4820');
        } catch (e) {}
      });
    }
  </script>
</body>
</html>
