<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0B0C0E" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MasteryCap" />
  <meta name="description" content="MasteryCap — trading mastery: bilingual course, discipline journal, risk sizing." />
  <meta name="color-scheme" content="dark light" />
  <title>MasteryCap</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="preload" href="fonts/geist-600.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/geist-500.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/geistmono-500.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <!-- film grain texture overlay -->
  <div id="grain" aria-hidden="true"></div>

  <!-- Splash -->
  <div id="splash">
    <div class="splash-inner">
      <div class="splash-booklet" aria-hidden="true">
        <div class="splash-stamp">PASS</div>
      </div>
      <div class="splash-word">Mastery<span>Cap</span></div>
    </div>
    <div class="splash-foot">Exam booklet · trade with discipline</div>
  </div>

  <!-- App -->
  <div id="app-root"></div>

  <!-- Bottom nav -->
  <nav class="tabbar hidden" id="tabbar"></nav>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
